version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: marketpulse-tsdb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=marketpulse
    restart: always
    volumes:
      - D:/workspace/Projects/MarketPulse/timescale-data:/var/lib/postgresql/data

  redis:
    image: redis:8.0-alpine
    container_name: marketpulse-cache
    ports:
      - "6379:6379"
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.10
    container_name: marketpulse-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.10
    container_name: marketpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_NUM_PARTITIONS: 32

      # TODO: Remove on production
      # Enable auto create new topics (For dev only)
      KAFKA_AUTO_CREATE_TOPICS_ENABLED: "true"

      # Data retention settings
      KAFKA_LOG_RETENTION_HOURS: 1 # Storage data for 1 hour
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # Storage data up to 1GB
    volumes:
      - D:/workspace/Projects/MarketPulse/kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: marketpulse-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: MarketPulse-Local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

